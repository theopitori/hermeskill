name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type:
    name: ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy packages/caspase-sdk/src packages/caspase-control-plane/src packages/caspase-hermes/src

  test:
    name: pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: caspase
          POSTGRES_PASSWORD: caspase
          POSTGRES_DB: caspase
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U caspase"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CASPASE_DB_URL: postgresql+asyncpg://caspase:caspase@localhost:5432/caspase
      CASPASE_API_KEY: sk_dev_developer_local_only_do_not_ship
      CASPASE_OPERATOR_KEY: sk_dev_operator_local_only_do_not_ship
      CASPASE_BASE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run Alembic migrations
        run: |
          uv run --package caspase-control-plane \
            alembic -c packages/caspase-control-plane/alembic.ini upgrade head

      - name: Pytest
        run: uv run pytest -q

  import-smoke:
    name: bare import smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install the SDK
        run: uv sync --package caspase

      - name: Bare import smoke test
        run: |
          uv run --package caspase python -c "import caspase; from caspase import CaspaseTerminated, CaspaseError; print(caspase.__version__)"
