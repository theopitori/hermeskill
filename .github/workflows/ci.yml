name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type:
    name: ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy packages/hermeskill-sdk/src packages/hermeskill-control-plane/src packages/hermeskill-hermes/src

  test:
    name: pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: hermeskill
          POSTGRES_PASSWORD: hermeskill
          POSTGRES_DB: hermeskill
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hermeskill"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      HERMESKILL_DB_URL: postgresql+asyncpg://hermeskill:hermeskill@localhost:5432/hermeskill
      HERMESKILL_API_KEY: sk_dev_developer_local_only_do_not_ship
      HERMESKILL_OPERATOR_KEY: sk_dev_operator_local_only_do_not_ship
      HERMESKILL_BASE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run Alembic migrations
        run: |
          uv run --package hermeskill-control-plane \
            alembic -c packages/hermeskill-control-plane/alembic.ini upgrade head

      - name: Pytest
        run: uv run pytest -q

  demo-smoke:
    name: demo showpiece (offline)
    runs-on: ubuntu-latest
    # Intentionally NO postgres service and NO HERMESKILL_DB_URL: the demo boots
    # its own in-process SQLite control plane and must run with zero external
    # state. Kept out of the main `pytest` job so it never shares a process (and
    # port 8000) with the Postgres-backed control-plane tests.
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Demo smoke test (every scenario kills + files a cert)
        run: uv run pytest demo/tests -q

      - name: Run the showpiece end-to-end
        run: uv run python -m demo

  import-smoke:
    name: bare import smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install the SDK
        run: uv sync --package hermeskill

      - name: Bare import smoke test
        run: |
          uv run --package hermeskill python -c "import hermeskill; from hermeskill import HermeskillTerminated, HermeskillError; print(hermeskill.__version__)"
