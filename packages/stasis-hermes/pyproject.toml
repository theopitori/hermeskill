[project]
name = "stasis-hermes"
version = "0.1.0a0"
description = "Stasis apoptosis plugin for Hermes Agent — install once, your agent never runs away again"
readme = "src/stasis_hermes/README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "stasis-agent>=0.1.0a0",
]

[project.urls]
Homepage = "https://github.com/seijeupessoal-ui/stasis"
Documentation = "https://github.com/seijeupessoal-ui/stasis#readme"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/stasis_hermes"]
