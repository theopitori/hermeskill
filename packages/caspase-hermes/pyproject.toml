[project]
name = "caspase-hermes"
version = "0.1.0a0"
description = "Caspase apoptosis plugin for Hermes Agent — install once, your agent never runs away again"
readme = "src/caspase_hermes/README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "caspase>=0.1.0a0",
]

[project.urls]
Homepage = "https://github.com/seijeupessoal-ui/Caspase"
Documentation = "https://github.com/seijeupessoal-ui/Caspase#readme"

# Hermes Agent plugin auto-discovery: when this package is installed,
# Hermes finds it via importlib.metadata and calls register(ctx) at
# session start. See hermes_cli/plugins.py::_scan_entry_points and the
# ENTRY_POINTS_GROUP constant. No directory copy required.
[project.entry-points."hermes_agent.plugins"]
caspase = "caspase_hermes:register"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/caspase_hermes"]

# Ship plugin.yaml inside the wheel so the directory-install path
# (cp -r into ~/.hermes/plugins/caspase/) also has a valid manifest.
# Entry-point installs don't read this file but won't reject it either.
[tool.hatch.build.targets.wheel.force-include]
"src/caspase_hermes/plugin.yaml" = "caspase_hermes/plugin.yaml"
