name: caspase
version: "0.1.0a0"
description: "Apoptosis supervision for Hermes Agent — watches every tool call and LLM turn, terminates runaway agents cleanly, and posts a death certificate."
author: Caspase Contributors
requires_env:
  - CASPASE_API_KEY
hooks:
  - pre_tool_call
  - post_tool_call
  - pre_llm_call
  - post_api_request
  - on_session_end
