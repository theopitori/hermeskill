[project]
name = "stasis-control-plane"
version = "0.1.0a0"
description = "Caspase Control Plane — FastAPI backend for agent supervision"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.8",
    "pydantic-settings>=2.5",
    "sqlalchemy[asyncio]>=2.0.32",
    "alembic>=1.13",
    "asyncpg>=0.30",
    "tenacity>=9.0",
    "pyyaml>=6.0",
    "stasis-agent",
]

[project.scripts]
stasis-control-plane = "control_plane.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/control_plane"]
